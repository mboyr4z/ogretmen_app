<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Logo Önizleme</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f1f5f9; padding: 40px; display: flex; flex-direction: column; gap: 32px; align-items: center; }
.row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; justify-content: center; }
.box { background: #fff; border-radius: 16px; padding: 32px 40px; box-shadow: 0 2px 12px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: center; }
.box.dark { background: #1e293b; }
label { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 8px; }
.col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<div class="row">
  <!-- Açık arka plan -->
  <div class="col">
    <div class="box">
      <svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Kağıt (eğik, -12 derece) -->
        <g transform="translate(6,4) rotate(-12, 16, 18)">
          <rect x="2" y="2" width="26" height="33" rx="3" fill="#e0e7ff" stroke="#2563eb" stroke-width="1.8"/>
          <!-- Test satırları -->
          <line x1="6" y1="10" x2="24" y2="10" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="16" x2="22" y2="16" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="21" x2="24" y2="21" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="26" x2="19" y2="26" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round"/>
          <!-- A B C D seçenekleri -->
          <circle cx="8"  cy="16" r="1.8" fill="#2563eb" opacity=".35"/>
          <circle cx="8"  cy="21" r="1.8" fill="#2563eb" opacity=".35"/>
          <circle cx="8"  cy="26" r="1.8" fill="#2563eb"/>
        </g>
        <!-- Kalem (eğik, kağıdın üzerine yaslanmış) -->
        <g transform="translate(22, 2) rotate(38, 8, 24)">
          <!-- Silgi -->
          <rect x="5" y="0" width="7" height="5" rx="1.5" fill="#fca5a5"/>
          <!-- Metal bant -->
          <rect x="5" y="4.5" width="7" height="3" fill="#9ca3af"/>
          <!-- Gövde -->
          <rect x="5" y="7" width="7" height="26" rx="1" fill="#fbbf24"/>
          <!-- Kenar çizgileri -->
          <line x1="7" y1="7" x2="7" y2="33" stroke="#f59e0b" stroke-width="1"/>
          <!-- Uç -->
          <polygon points="5,33 12,33 8.5,41" fill="#f5e6c8"/>
          <polygon points="7,36 10,36 8.5,41" fill="#1e293b"/>
        </g>
        <!-- SınıfPro yazı -->
        <text x="52" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#1e293b">Sınıf</text>
        <text x="122" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#2563eb">Pro</text>
      </svg>
    </div>
    <label>Açık tema</label>
  </div>

  <!-- Koyu arka plan (sidebar) -->
  <div class="col">
    <div class="box dark">
      <svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(6,4) rotate(-12, 16, 18)">
          <rect x="2" y="2" width="26" height="33" rx="3" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.8"/>
          <line x1="6" y1="10" x2="24" y2="10" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="16" x2="22" y2="16" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="21" x2="24" y2="21" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="26" x2="19" y2="26" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="8"  cy="16" r="1.8" fill="#60a5fa" opacity=".4"/>
          <circle cx="8"  cy="21" r="1.8" fill="#60a5fa" opacity=".4"/>
          <circle cx="8"  cy="26" r="1.8" fill="#60a5fa"/>
        </g>
        <g transform="translate(22, 2) rotate(38, 8, 24)">
          <rect x="5" y="0" width="7" height="5" rx="1.5" fill="#fca5a5"/>
          <rect x="5" y="4.5" width="7" height="3" fill="#6b7280"/>
          <rect x="5" y="7" width="7" height="26" rx="1" fill="#fbbf24"/>
          <line x1="7" y1="7" x2="7" y2="33" stroke="#f59e0b" stroke-width="1"/>
          <polygon points="5,33 12,33 8.5,41" fill="#f5e6c8"/>
          <polygon points="7,36 10,36 8.5,41" fill="#0f172a"/>
        </g>
        <text x="52" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#f8fafc">Sınıf</text>
        <text x="122" y="35" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#60a5fa">Pro</text>
      </svg>
    </div>
    <label>Koyu tema (sidebar)</label>
  </div>

  <!-- Sadece ikon (favicon boyutu) -->
  <div class="col">
    <div class="box" style="padding: 20px;">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(4,4) rotate(-12, 14, 18)">
          <rect x="1" y="1" width="26" height="33" rx="3" fill="#e0e7ff" stroke="#2563eb" stroke-width="2"/>
          <line x1="5" y1="10" x2="23" y2="10" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="16" x2="21" y2="16" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="22" x2="23" y2="22" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="7" cy="16" r="2" fill="#2563eb" opacity=".4"/>
          <circle cx="7" cy="22" r="2" fill="#2563eb"/>
        </g>
        <g transform="translate(22, 0) rotate(38, 8, 24)">
          <rect x="5" y="0" width="7" height="5" rx="1.5" fill="#fca5a5"/>
          <rect x="5" y="4.5" width="7" height="3" fill="#9ca3af"/>
          <rect x="5" y="7" width="7" height="22" rx="1" fill="#fbbf24"/>
          <polygon points="5,29 12,29 8.5,37" fill="#f5e6c8"/>
          <polygon points="7,32 10,32 8.5,37" fill="#1e293b"/>
        </g>
      </svg>
    </div>
    <label>Favicon / ikon</label>
  </div>
</div>

</body>
</html>
